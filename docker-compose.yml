services:
  postgres:
    image: postgres:16-alpine
    container_name: audit-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: audit_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - audit_assistant_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d audit_assistant']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  audit_assistant_postgres_data:
